---
version: '3'

set: [pipefail]
shopt: [globstar]

vars:
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'
  SECRET_DOMAIN: 'koopmans.co'
  TIMEZONE: 'America/Chicago'

includes:
  bootstrap: .taskfiles/bootstrap
  talos: .taskfiles/talos
  template: .taskfiles/template
  sops: .taskfiles/sops

tasks:

  default: task --list

  apply:
    desc: Apply a App Kustomization resource for a cluster
    summary: |
      Args:
        path: Path under apps containing the  app (required)
    cmd: |
      TMP_APP_DIR="$(mktemp -d)"
      trap 'rm -rf "$TMP_APP_DIR"' EXIT
      cp -R "{{.KUBERNETES_DIR}}/apps/{{.path}}/app/." "$TMP_APP_DIR/"

      if find "$TMP_APP_DIR" -type f -name ".decrypted~*.sops.*" | grep -q .; then
        echo "Found decrypted SOPS artifact(s) (.decrypted~*.sops.*) under app path. Remove them and retry." >&2
        exit 1
      fi

      find "$TMP_APP_DIR" -type f \( -name "*.sops.yaml" -o -name "*.sops.yml" \) | while IFS= read -r encrypted_file; do
        sops --decrypt "$encrypted_file" > "$encrypted_file.tmp"
        mv "$encrypted_file.tmp" "$encrypted_file"
      done

      kustomize build "$TMP_APP_DIR" | envsubst | \
      kubectl apply --kubeconfig {{.KUBECONFIG}} --server-side \
          --field-manager=kustomize-controller -f -
    requires:
      vars: ["path"]
    vars:
      ns: '{{.ns | default "flux-system"}}'
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }

  remove:
    desc: Remove a App Kustomization resource for a cluster while testing
    summary: |
      Args:
        path: Path under apps containing the  app (required)
    cmd: |
      TMP_APP_DIR="$(mktemp -d)"
      trap 'rm -rf "$TMP_APP_DIR"' EXIT
      cp -R "{{.KUBERNETES_DIR}}/apps/{{.path}}/app/." "$TMP_APP_DIR/"

      if find "$TMP_APP_DIR" -type f -name ".decrypted~*.sops.*" | grep -q .; then
        echo "Found decrypted SOPS artifact(s) (.decrypted~*.sops.*) under app path. Remove them and retry." >&2
        exit 1
      fi

      find "$TMP_APP_DIR" -type f \( -name "*.sops.yaml" -o -name "*.sops.yml" \) | while IFS= read -r encrypted_file; do
        sops --decrypt "$encrypted_file" > "$encrypted_file.tmp"
        mv "$encrypted_file.tmp" "$encrypted_file"
      done

      kustomize build "$TMP_APP_DIR" | envsubst | \
      kubectl delete --kubeconfig {{.KUBECONFIG}} -f -
    requires:
      vars: ["path"]
    vars:
      ns: '{{.ns | default "flux-system"}}'
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }



  app:decommission:phase1:
    desc: "GitOps app removal phase 1 — remove HelmRelease to trigger helm uninstall"
    summary: |
      Args:
        path: namespace/appname path under kubernetes/apps (e.g. default/myapp)

      Removes helmrelease.yaml from the app's kustomization resources, commits,
      pushes, and triggers a Flux reconcile. Wait for the HelmRelease and pods
      to terminate before running app:decommission:phase2.
    cmd: |
      APP_NAME="$(basename "{{.path}}")"
      APP_KS="{{.KUBERNETES_DIR}}/apps/{{.path}}/app/kustomization.yaml"
      # App Kustomization CRs live in the group namespace (set by the namespace
      # transformer in the group kustomization.yaml), which may differ from the
      # directory name (e.g. serverless/ -> knative-serving).
      NS="$(yq '.namespace' "{{.KUBERNETES_DIR}}/apps/$(dirname "{{.path}}")/kustomization.yaml")"

      if [ ! -f "$APP_KS" ]; then
        echo "ERROR: App kustomization not found at $APP_KS" >&2
        exit 1
      fi

      if ! grep -q "helmrelease.yaml" "$APP_KS"; then
        echo "No helmrelease.yaml in $APP_KS — skipping phase 1 (no HelmRelease to remove)."
        echo "Proceed directly with: task app:decommission:phase2 path={{.path}}"
        exit 0
      fi

      yq -i 'del(.resources[] | select(. == "./helmrelease.yaml"))' "$APP_KS"
      git add "$APP_KS"
      git commit -m "feat(${APP_NAME}): remove HelmRelease (phase 1 of removal)"
      git pull --rebase --autostash
      git push
      flux --namespace "${NS}" reconcile kustomization "${APP_NAME}" --with-source
      echo ""
      echo "Phase 1 complete. Verify with:"
      echo "  kubectl get helmrelease,pods -n ${NS} | grep ${APP_NAME}"
      echo "Then run: task app:decommission:phase2 path={{.path}}"
    requires:
      vars: ["path"]
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "flux not found", sh: "which flux" }
      - { msg: "yq not found", sh: "which yq" }

  app:decommission:phase2:
    desc: "GitOps app removal phase 2 — remove Kustomization entry and all app files"
    summary: |
      Args:
        path: namespace/appname path under kubernetes/apps (e.g. default/myapp)

      Removes the app's ks.yaml from the parent namespace kustomization.yaml,
      deletes the app directory, commits, pushes, and triggers a Flux reconcile
      of cluster-apps. Run only after phase 1 has completed and pods have terminated.
    cmd: |
      APP_NAME="$(basename "{{.path}}")"
      GROUP_DIR="$(dirname "{{.path}}")"
      APP_DIR="{{.KUBERNETES_DIR}}/apps/{{.path}}"
      PARENT_KS="{{.KUBERNETES_DIR}}/apps/${GROUP_DIR}/kustomization.yaml"
      KS_ENTRY="./${APP_NAME}/ks.yaml"
      # Group namespace may differ from the directory name (e.g. serverless/ -> knative-serving)
      NS="$(yq '.namespace' "$PARENT_KS")"

      if [ ! -d "$APP_DIR" ]; then
        echo "ERROR: App directory not found at $APP_DIR" >&2
        exit 1
      fi

      if [ ! -f "$PARENT_KS" ]; then
        echo "ERROR: Parent kustomization not found at $PARENT_KS" >&2
        exit 1
      fi

      yq -i "del(.resources[] | select(. == \"${KS_ENTRY}\"))" "$PARENT_KS"
      rm -rf "$APP_DIR"
      git add "$PARENT_KS" "$APP_DIR"
      git commit -m "feat(${APP_NAME}): remove application (phase 2 of removal)"
      git pull --rebase --autostash
      git push
      flux --namespace flux-system reconcile kustomization cluster-apps --with-source
      echo ""
      echo "Phase 2 complete. Verify with:"
      echo "  kubectl get kustomization ${APP_NAME} -n ${NS}"
      echo "  kubectl get pvc,configmap,secret -n ${NS} | grep ${APP_NAME}"
    requires:
      vars: ["path"]
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "flux not found", sh: "which flux" }
      - { msg: "yq not found", sh: "which yq" }


  build:
    desc: build Resources at a given path using customize and test against kubeconform
    summary: |
      Args:
        path: Path under apps containing the Flux Kustomization resource (ks.yaml) (required)

    cmd: |
      TMP_APP_DIR="$(mktemp -d)"
      trap 'rm -rf "$TMP_APP_DIR"' EXIT
      cp -R "{{.KUBERNETES_DIR}}/apps/{{.path}}/app/." "$TMP_APP_DIR/"

      if find "$TMP_APP_DIR" -type f -name ".decrypted~*.sops.*" | grep -q .; then
        echo "Found decrypted SOPS artifact(s) (.decrypted~*.sops.*) under app path. Remove them and retry." >&2
        exit 1
      fi

      find "$TMP_APP_DIR" -type f \( -name "*.sops.yaml" -o -name "*.sops.yml" \) | while IFS= read -r encrypted_file; do
        sops --decrypt "$encrypted_file" > "$encrypted_file.tmp"
        mv "$encrypted_file.tmp" "$encrypted_file"
      done

      kustomize build "$TMP_APP_DIR" | envsubst

    requires:
      vars: ["path"]
    preconditions:
      - { msg: "Missing kubeconfig ", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing Flux Kustomization for app {{.path}}", sh: "test -f {{.KUBERNETES_DIR}}/apps/{{.path}}/ks.yaml" }


  validate:
    desc: Run an asset through the validation offered by kubeconform
    summary: |
      Args:
        path: Path under apps containing the Flux Kustomization resource (ks.yaml) (required)
    cmd: |
      bash {{.SCRIPTS_DIR}}/kubeconform.sh {{.KUBERNETES_DIR}}
    preconditions:
      - { msg: "Missing kubeconfigflux ", sh: "test -f {{.KUBECONFIG}}" }


  reconcile:
    desc: Force Flux to pull in changes from your Git repository
    cmd: flux --namespace flux-system reconcile kustomization flux-system --with-source
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux

  envoy:probe:
    desc: Probe internal Envoy-backed apps and report pod/node drift
    cmd: bash {{.SCRIPTS_DIR}}/envoy-healthcheck.sh
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing envoy healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/envoy-healthcheck.sh" }

  envoy:repair:
    desc: Probe and delete the most suspicious envoy-internal pod
    cmd: bash {{.SCRIPTS_DIR}}/envoy-healthcheck.sh --repair
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing envoy healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/envoy-healthcheck.sh" }

  envoy:cordon-node:
    desc: Probe and cordon the node hosting the suspicious envoy-internal pod
    cmd: bash {{.SCRIPTS_DIR}}/envoy-healthcheck.sh --cordon-node
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing envoy healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/envoy-healthcheck.sh" }

  envoy:drain-node:
    desc: Probe and drain the node hosting the suspicious envoy-internal pod
    cmd: bash {{.SCRIPTS_DIR}}/envoy-healthcheck.sh --drain-node
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing envoy healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/envoy-healthcheck.sh" }

  # Pre-flight gate for higher-risk operations: fail fast if core controllers,
  # workloads, storage, jobs, or key infra namespaces show unhealthy signals.
  cluster:health:
    desc: Run a full cluster healthcheck before/after risky operations
    summary: |
      Args:
        args: Optional flags for cluster-healthcheck.sh (example: --show-logs)
    cmd: bash {{.SCRIPTS_DIR}}/cluster-healthcheck.sh {{.args | default ""}}
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing cluster healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/cluster-healthcheck.sh" }

  # Continuous watch mode for maintenance windows; useful while applying staged
  # changes so regressions are caught between steps.
  cluster:health:watch:
    desc: Periodically run cluster health checks (default every 300s)
    summary: |
      Args:
        interval: Seconds between checks (optional, default: 300)
        args: Optional flags for cluster-healthcheck.sh (example: --show-logs)
    cmd: bash {{.SCRIPTS_DIR}}/cluster-healthcheck.sh --watch {{.interval | default "300"}} {{.args | default ""}}
    preconditions:
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG}}" }
      - { msg: "Missing cluster healthcheck script", sh: "test -f {{.SCRIPTS_DIR}}/cluster-healthcheck.sh" }

  # Sensitivity presets for restart-signal detection to avoid long arg strings.
  cluster:health:strict:
    desc: Run health checks with stricter restart-signal thresholds
    cmds:
      - task: cluster:health
        vars:
          args: >-
            --restart-fast-events 2
            --restart-fast-logs 3
            --restart-fast-combined-events 1
            --restart-fast-combined-logs 1
            --restart-slow-events 4
            --restart-slow-logs 6

  cluster:health:relaxed:
    desc: Run health checks with more tolerant restart-signal thresholds
    cmds:
      - task: cluster:health
        vars:
          args: >-
            --restart-fast-events 4
            --restart-fast-logs 6
            --restart-fast-combined-events 3
            --restart-fast-combined-logs 3
            --restart-slow-events 8
            --restart-slow-logs 10
            --restart-namespace-pods 3

  cluster:health:strict:watch:
    desc: Watch mode with strict restart-signal thresholds
    summary: |
      Args:
        interval: Seconds between checks (optional, default: 300)
    cmds:
      - task: cluster:health:watch
        vars:
          interval: '{{.interval | default "300"}}'
          args: >-
            --restart-fast-events 2
            --restart-fast-logs 3
            --restart-fast-combined-events 1
            --restart-fast-combined-logs 1
            --restart-slow-events 4
            --restart-slow-logs 6

  cluster:health:relaxed:watch:
    desc: Watch mode with tolerant restart-signal thresholds
    summary: |
      Args:
        interval: Seconds between checks (optional, default: 300)
    cmds:
      - task: cluster:health:watch
        vars:
          interval: '{{.interval | default "300"}}'
          args: >-
            --restart-fast-events 4
            --restart-fast-logs 6
            --restart-fast-combined-events 3
            --restart-fast-combined-logs 3
            --restart-slow-events 8
            --restart-slow-logs 10
            --restart-namespace-pods 3
