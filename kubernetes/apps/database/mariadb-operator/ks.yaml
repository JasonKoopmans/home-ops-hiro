---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mariadb-operator
  namespace: flux-system
spec:
  targetNamespace: database
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # Wait for the operator HelmRelease to be ready before this Kustomization is
  # considered healthy. Consuming apps must set dependsOn: [{name: mariadb-operator}]
  # so that CRDs are guaranteed to exist before any MariaDB CRs are created.
  # CRD ordering is enforced via HelmRelease dependsOn within the app directory.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mariadb-operator
      namespace: database
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/database/mariadb-operator/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
