---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
spec:
  interval: 1h
  dependsOn:
    - name: mariadb-operator-crds
      namespace: default
  chart:
    spec:
      chart: mariadb-operator
      version: 26.3.0
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: database
  install:
    remediation:
      retries: -1
    # CRDs are managed by the mariadb-operator-crds HelmRelease
    crds: Skip
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: Skip
  values:
    metrics:
      enabled: false
