---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: mariadb-operator
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: database
  install:
    remediation:
      retries: -1
    crds: CreateReplace
    wait: true
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
    wait: true
  values:
    metrics:
      enabled: false
