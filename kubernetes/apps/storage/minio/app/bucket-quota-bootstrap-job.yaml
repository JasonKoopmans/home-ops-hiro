---
# Bucket quota bootstrap Job — runs once after Minio is healthy.
# Sets a hard quota per bucket so a runaway write pattern (e.g. a cardinality
# explosion in Thanos) fails writes instead of filling the shared 65Gi PVC
# and taking the whole node down.
#
# These are backstop values, not a capacity plan. The original 45GiB quota on
# a 50Gi PVC was hit for real: observability-thanos reached 47Gi and the PVC
# sat at 99% used with 767Mi free, which starved the compactor's raw-
# resolution merge of the transient headroom it needs to write a new block
# before deleting its sources — see docs/incident-thanos-compactor-disk-pressure.md.
# Fixed by growing the PVC 50Gi -> 65Gi and this quota 45GiB -> 55GiB. (Capped
# at 65Gi, not a round 100Gi, by physical free space on one of this volume's
# two Longhorn replica disks — see the persistence.size comment in
# helmrelease.yaml for the full explanation.)
# Revisit both again once minio_bucket_usage_total_bytes (scraped via
# probe-bucket-metrics.yaml) has a few weeks of real data past this change.
#
# observability-loki is currently unused (Loki runs with storage.type: filesystem,
# see monitoring/loki/app/helmrelease.yaml) — its quota here is just a guard
# against silent growth if that ever changes, not a tuned value.
#
# Manual equivalent:
#   mc quota set local/observability-thanos --size 55GiB
#   mc quota set local/observability-loki --size 2GiB
#
# Failure detection relies on kube-prometheus-stack's default KubeJobFailed
# alert (kube_job_failed > 0, for: 15m) — verified this fires for Jobs in any
# namespace including storage, but only once the Job reaches a terminal
# Failed condition. backoffLimit is lowered from the Kubernetes default of 6
# (which could take 90+ minutes to exhaust here, since each attempt repeats
# the ~15 minute wait-for-minio loop below) so a persistent failure surfaces
# in well under an hour. activeDeadlineSeconds is a hard ceiling in case `mc`
# hangs outright, which wouldn't otherwise produce the exit code backoffLimit
# needs to count an attempt as failed.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-quota-bootstrap
  namespace: storage
  annotations:
    # prune: false prevents Flux from auto-deleting this Job if it is ever
    # removed from kustomization.yaml (completed Job acts as an audit record).
    # To fully remove: first delete this resource from kustomization.yaml and
    # push to Git, then manually clean up the completed Job:
    #   kubectl -n storage delete job minio-bucket-quota-bootstrap
    kustomize.toolkit.fluxcd.io/prune: "false"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              RETRIES=0; MAX_RETRIES=180
              until mc alias set local http://minio.storage.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                RETRIES=$((RETRIES + 1))
                if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then
                  echo "ERROR: minio did not become ready after $((MAX_RETRIES * 5))s, giving up"
                  exit 1
                fi
                echo "waiting for minio... (attempt $RETRIES/$MAX_RETRIES)"; sleep 5
              done
              mc quota set local/observability-thanos --size 55GiB
              mc quota set local/observability-loki --size 2GiB
              echo "bucket quotas set"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: rootPassword
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
