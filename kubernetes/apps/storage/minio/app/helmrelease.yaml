---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      version: "17.0.21"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: storage
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - name: minio-root-credentials
      kind: Secret
      valuesKey: rootUser
      targetPath: auth.rootUser
    - name: minio-root-credentials
      kind: Secret
      valuesKey: rootPassword
      targetPath: auth.rootPassword
  values:
    # Single-node deployment suitable for homelab; no distributed mode overhead
    mode: standalone

    defaultBuckets: "observability-thanos,observability-loki"

    service:
      type: ClusterIP
      ports:
        api: 9000
        console: 9001

    persistence:
      enabled: true
      storageClass: longhorn-1
      size: 50Gi

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

    metrics:
      serviceMonitor:
        enabled: false
