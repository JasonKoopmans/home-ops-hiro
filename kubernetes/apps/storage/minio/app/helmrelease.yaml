---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      # renovate: registryUrl=https://charts.min.io/
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: storage
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Single-node deployment suitable for homelab; no distributed mode overhead
    mode: standalone

    # Read rootUser and rootPassword from the existing SOPS-encrypted secret
    existingSecret: minio-root-credentials

    # Disable the default console user created by chart post-install jobs
    users: []

    # Pre-create buckets on first deploy
    buckets:
      - name: observability-thanos
        policy: none
        purge: false
      - name: observability-loki
        policy: none
        purge: false

    service:
      type: ClusterIP

    consoleService:
      type: ClusterIP

    persistence:
      enabled: true
      storageClass: longhorn-2-no-backup
      # Stayed at 50Gi after two failed growth attempts (2026-07-19, see
      # docs/incident-thanos-compactor-disk-pressure.md #7): one of this
      # volume's 2 replicas lives on hiro-cmp-01/disk-1, a disk shared by 8
      # other volumes and already near its scheduled-capacity ceiling
      # (~6.7GB real headroom via Longhorn's ScheduledTotal check, not the
      # ~17.8GB raw StorageAvailable figure that first looked promising). The
      # transient space a stuck compaction group actually needed (~35-40GB:
      # 7 source blocks totaling ~19.7GB, plus the new merged block) was far
      # beyond what that disk could ever provide without relocating a
      # replica. The stuck group ages out of the 7d raw retention window on
      # 2026-07-23 and gets deleted outright instead of compacted, so this
      # self-resolves without a PVC change. A real permanent fix (if
      # capacity pressure recurs) means evicting/rebuilding the
      # hiro-cmp-01 replica onto a roomier node (hiro-cmp-02 or -04 both had
      # >25GB scheduled headroom at the time), not just bumping this number.
      size: 50Gi

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

    metrics:
      serviceMonitor:
        enabled: true
        # Standalone mode has one node, but this also scrapes per-drive/process
        # metrics (S3 request errors, uptime) not present in the cluster-level Probe.
        includeNode: true
        interval: 30s
