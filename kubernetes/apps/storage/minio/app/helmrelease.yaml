---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  chart:
    spec:
      chart: minio
      # renovate: registryUrl=https://charts.min.io/
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: storage
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Single-node deployment suitable for homelab; no distributed mode overhead
    mode: standalone

    # Read rootUser and rootPassword from the existing SOPS-encrypted secret
    existingSecret: minio-root-credentials

    # Disable the default console user created by chart post-install jobs
    users: []

    # Pre-create buckets on first deploy
    buckets:
      - name: observability-thanos
        policy: none
        purge: false
      - name: observability-loki
        policy: none
        purge: false

    service:
      type: ClusterIP

    consoleService:
      type: ClusterIP

    persistence:
      enabled: true
      storageClass: longhorn-2-no-backup
      # Grown 50Gi -> 100Gi: observability-thanos alone reached 47Gi (PVC was
      # at 99% used, 767Mi free), starving the compactor's raw-resolution
      # merge of the transient headroom it needs to write a new block before
      # deleting its sources. Same live-expansion pattern as #315
      # (thanos-compactor-data 30Gi -> 60Gi) - storage.requests is mutable,
      # storageClassName is not.
      size: 100Gi

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

    metrics:
      serviceMonitor:
        enabled: true
        # Standalone mode has one node, but this also scrapes per-drive/process
        # metrics (S3 request errors, uptime) not present in the cluster-level Probe.
        includeNode: true
        interval: 30s
