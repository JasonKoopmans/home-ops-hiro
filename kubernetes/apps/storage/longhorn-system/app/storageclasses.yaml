---
# 1 replica — lower redundancy, saves disk space
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-1
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    # params are immutable; let Flux recreate rather than fail the apply
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: best-effort
  replicaAutoBalance: best-effort

---
# 2 replicas — moderate redundancy
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-2
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    # params are immutable; let Flux recreate rather than fail the apply
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  dataLocality: best-effort
  replicaAutoBalance: best-effort

---
# 3 replicas, no backups — same redundancy as default, snapshots but no recurring backup.
#
# recurringJobSelector MUST name a real group. An empty "[]" does NOT opt out:
# Longhorn "will automatically add a volume to the `default` group when the volume
# has no recurring job", and `default` carries BOTH a 6-hourly snapshot job AND a
# daily backup job — so "[]" silently opted these classes into the exact backups
# their name disclaims. Naming the snapshot-only group is what actually excludes
# them, because the volume then has a job and default is not auto-applied.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    # StorageClass.parameters is immutable; without this a selector change fails to
    # apply and wedges the whole longhorn Kustomization. Scoped per-resource rather
    # than spec.force, which would also cover the Longhorn HelmRelease.
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: '[{"name":"snapshot-only","isGroup":true}]'

---
# 1 replica, no backups
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-1-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: '[{"name":"snapshot-only","isGroup":true}]'

---
# 2 replicas, no backups
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-2-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: '[{"name":"snapshot-only","isGroup":true}]'

---
# TSDB/write-heavy volumes (e.g., Prometheus) — daily snapshot only via longhorn-tsdb-snapshot-job.
# The Prometheus PVC was moved onto this class in #310; the daily/retain-2 cadence is
# what keeps its snapshot chain from outrunning cleanup. Use this class (not the
# *-no-backup ones, which snapshot 6-hourly) for any new continuously-written volume.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-tsdb
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    # params are immutable; let Flux recreate rather than fail the apply
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: '[{"name":"tsdb","isGroup":true}]'

---
# Disposable working scratch — rewritten/discarded every run, worth zero snapshots
# or backups (unlike snapshot-only/tsdb, which still take periodic snapshots for
# rollback). Single replica: no redundancy value in scratch data, and no reason to
# pay 2x write cost for it — on node loss the consumer just redownloads/recomputes.
#
# recurringJobSelector names a group ("scratch") that has NO RecurringJob targeting
# it. This is deliberate, not an oversight: per #311, the CSI driver sets the
# recurring-job-group label purely from this selector at provision time — it does
# not check whether a job exists for the name. That label's mere presence is what
# excludes the volume from Longhorn's `default` group (6-hourly snapshot + daily
# backup) fallback. Since nothing ever targets "scratch", no job ever fires: no
# snapshots are taken, so there is no chain to bloat — closer in behaviour to
# emptyDir than to any other class here. Do NOT add a RecurringJob for this group;
# that would defeat the point.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-scratch
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    # params are immutable; let Flux recreate rather than fail the apply
    kustomize.toolkit.fluxcd.io/force: "Enabled"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: '[{"name":"scratch","isGroup":true}]'
