---
# 1 replica — lower redundancy, saves disk space
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-1
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: best-effort
  replicaAutoBalance: best-effort

---
# 2 replicas — moderate redundancy
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-2
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  dataLocality: best-effort
  replicaAutoBalance: best-effort

---
# 3 replicas, no backups — same redundancy as default but exempt from recurring backup/snapshot jobs
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: "[]"

---
# 1 replica, no backups
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-1-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: "[]"

---
# 2 replicas, no backups
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-2-no-backup
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  dataLocality: best-effort
  replicaAutoBalance: best-effort
  recurringJobSelector: "[]"
