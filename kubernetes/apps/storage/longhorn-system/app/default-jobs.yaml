apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: longhorn-default-snapshot-job
  namespace: storage
spec:
  cron: "15 */6 * * *" # every 6 hours at minute 15
  task: "snapshot"
  groups:
  - default
  retain: 3
  concurrency: 2

---

apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: longhorn-default-backup-job
  namespace: storage
spec:
  cron: "45 2 * * *" # every day at 2:45 AM
  task: "backup"
  groups:
  - default
  retain: 3
  concurrency: 2

---

apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: longhorn-snapshot-only-job
  namespace: storage
spec:
  cron: "15 */6 * * *" # every 6 hours at minute 15
  task: "snapshot"
  groups:
  - snapshot-only
  retain: 3
  concurrency: 2

---

# Prometheus TSDB continuous writes cause frequent snapshot chains to exceed retain: 3 faster than cleanup runs.
# This daily job targets the tsdb group — opt volumes in via the longhorn-tsdb StorageClass.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: longhorn-tsdb-snapshot-job
  namespace: storage
spec:
  cron: "15 4 * * *" # every day at 4:15 AM
  task: "snapshot"
  groups:
  - tsdb
  retain: 2
  concurrency: 1
