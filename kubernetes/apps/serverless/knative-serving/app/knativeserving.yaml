---
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: knative-serving
spec:
  # Keep control-plane and APIs on the latest 1.22 patch stream.
  version: "1.22"
  ingress:
    istio:
      enabled: false
  additionalManifests:
    - URL: https://github.com/knative-extensions/net-gateway-api/releases/download/knative-v1.22.0/release.yaml
  config:
    domain:
      # Register koopmans.co as the default domain for Knative Services.
      # KServices will get URLs like <name>.<namespace>.koopmans.co via the external gateway.
      koopmans.co: ""
    network:
      ingress-class: gateway-api.ingress.networking.knative.dev
    gateway:
      external-gateways: |
        - class: envoy
          gateway: network/envoy-external
          service: network/envoy-external
      local-gateways: |
        - class: envoy
          gateway: network/envoy-internal
          service: network/envoy-internal
