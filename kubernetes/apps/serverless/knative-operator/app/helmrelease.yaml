---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: knative-operator
  namespace: knative-serving
spec:
  interval: 1h
  chart:
    spec:
      chart: knative-operator
      # renovate: datasource=helm depName=knative-operator/knative-operator
      version: "v1.22.3"
      sourceRef:
        kind: HelmRepository
        name: knative-operator
        namespace: knative-serving
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    force: true
    remediation:
      retries: 3
  # Strip `_example` keys from config-logging and config-observability before
  # Helm applies them. The Knative serving webhook denies any update that
  # modifies an `_example` key, but these ConfigMaps are already managed by
  # the KnativeServing operator. Removing the key here means Helm never diffs
  # it, so the webhook is never triggered on future upgrades.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ConfigMap
              name: config-logging
              namespace: knative-serving
            patch: |
              - op: remove
                path: /data/_example
          - target:
              kind: ConfigMap
              name: config-observability
              namespace: knative-serving
            patch: |
              - op: remove
                path: /data/_example
          # Right-size operator CPU requests. Both deployments idle at ~1-3m
          # but the chart reserves 100m each; only the CPU request is lowered
          # (memory request and limits are untouched, bursting unaffected).
          - target:
              kind: Deployment
              name: knative-operator
              namespace: knative-serving
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/resources/requests/cpu
                value: 25m
          - target:
              kind: Deployment
              name: operator-webhook
              namespace: knative-serving
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/resources/requests/cpu
                value: 25m
