---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tika-ner
spec:
  interval: 1h
  timeout: 20m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          build-opennlp-models:
            image:
              repository: docker.io/library/eclipse-temurin
              tag: 21-jdk-alpine
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eux
                NER_ROOT="/work/org/apache/tika/parser/ner/opennlp"
                mkdir -p "$${NER_ROOT}"

                wget -O "$${NER_ROOT}/ner-person.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-person.bin
                wget -O "$${NER_ROOT}/ner-location.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-location.bin
                wget -O "$${NER_ROOT}/ner-organization.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-organization.bin
                wget -O "$${NER_ROOT}/ner-date.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-date.bin
                wget -O "$${NER_ROOT}/ner-time.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-time.bin
                wget -O "$${NER_ROOT}/ner-percentage.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-percentage.bin
                wget -O "$${NER_ROOT}/ner-money.bin" https://opennlp.sourceforge.net/models-1.5/en-ner-money.bin

                cd /work
                jar cf /tika-extras/opennlp-ner-models.jar org

                wget -O /tika-extras/tika-parser-nlp-package-3.3.0.jar https://repo1.maven.org/maven2/org/apache/tika/tika-parser-nlp-package/3.3.0/tika-parser-nlp-package-3.3.0.jar
                wget -O /tika-extras/opennlp-tools-2.4.0.jar https://repo1.maven.org/maven2/org/apache/opennlp/opennlp-tools/2.4.0/opennlp-tools-2.4.0.jar
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        containers:
          app:
            image:
              repository: docker.io/apache/tika
              tag: 3.3.0.0-full
            args:
              - -c
              - /tika-config/tika-config.xml
            env:
              TZ: ${TIMEZONE}
              JAVA_TOOL_OPTIONS: -Dner.impl.class=org.apache.tika.parser.ner.opennlp.OpenNLPNERecogniser
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: &healthPath /version
                    port: &port 9998
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: *healthPath
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: *healthPath
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 90
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
              runAsGroup: 35002
              runAsNonRoot: true
              runAsUser: 35002

    defaultPodOptions:
      securityContext:
        fsGroup: 35002
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: *port

    route:
      main:
        hostnames:
          - tika-ner.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port

    persistence:
      tika-config:
        type: configMap
        name: tika-ner-config
        advancedMounts:
          main:
            app:
              - path: /tika-config
                readOnly: true
      tika-extras:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /tika-extras
            build-opennlp-models:
              - path: /tika-extras
      work:
        type: emptyDir
        advancedMounts:
          main:
            build-opennlp-models:
              - path: /work
      tmp:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /tmp
