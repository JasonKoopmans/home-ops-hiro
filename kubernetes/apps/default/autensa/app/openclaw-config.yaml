---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autensa-openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "port": 18789,
        "auth": {
          "token": {
            "source": "env",
            "provider": "default",
            "id": "OPENCLAW_GATEWAY_TOKEN"
          }
        }
      },
      "agents": {
        "defaults": {
          "sandbox": {
            "mode": "off"
          }
        }
      }
    }
