---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bookshelf
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pennydreadful/bookshelf
              tag: hardcover-v0.4.20.129
            env:
              TZ: ${TIMEZONE}
              PUID: "1001"
              PGID: "1001"
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 2Gi
        initContainers:
          init-paths:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - /bin/sh
              - -c
            args:
              - mkdir -p /downloads/media/books
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsGroup: 1001
              runAsNonRoot: true
              runAsUser: 1001
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/instance
                        operator: In
                        values:
                          - qbittorrent
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - qbittorrent
                  topologyKey: kubernetes.io/hostname

    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [1001]

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 8787

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: readarr
          gethomepage.dev/title: Bookshelf
          gethomepage.dev/description: "Book Acquisition and Organization"
          gethomepage.dev/group: "Downloads"
        hostnames:
          - bookshelf.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port

    persistence:
      config:
        existingClaim: bookshelf-config
        globalMounts:
          - path: /config

      media:
        existingClaim: qbittorrent-downloads
        globalMounts:
          - path: /downloads

      tmp:
        type: emptyDir