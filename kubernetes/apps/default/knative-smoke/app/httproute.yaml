---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: knative-smoke
  namespace: default
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - knative-smoke.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: knative-smoke
          port: 80
