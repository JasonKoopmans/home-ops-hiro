---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: knative-smoke
  namespace: default
  labels:
    app.kubernetes.io/name: knative-smoke
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
    spec:
      containers:
        - image: docker.io/hashicorp/http-echo:1.0.0
          args:
            - "-text=knative-smoke-ok"
          ports:
            - containerPort: 5678
