---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rsvp-reader
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jasonkoopmans/rsvp-reader
              tag: 1.1.2
            env:
              TZ: ${TIMEZONE}
              # Required: allow browser WebSocket upgrades from the public hostname.
              # Without this the server only accepts localhost origins by default.
              WS_ALLOWED_ORIGINS: "https://rsvp-reader.${SECRET_DOMAIN}"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 8080

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: https://rsvp-reader.${SECRET_DOMAIN}/favicon.ico
          gethomepage.dev/title: RSVP Reader
          gethomepage.dev/description: "Speed reading with multi-device sync"
          gethomepage.dev/group: "Knowledge Systems"
        hostnames:
          - &hostName rsvp-reader.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
