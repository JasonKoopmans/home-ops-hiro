---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app obsidian
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: obsidian
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/linuxserver/obsidian
              tag: 1.12.7
            env:
              TZ: ${TIMEZONE}
              PUID: "1000"
              PGID: "1000"
              CUSTOM_PORT: "3000"
              CUSTOM_WS_PORT: "8082"
              # Obsidian Local REST API plugin default port
              OBSIDIAN_REST_API_PORT: "27124"
              # Obsidian Local REST API MCP endpoint is served on the REST port at /mcp
              OBSIDIAN_MCP_PORT: "27124"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

    service:
      app:
        controller: main
        ports:
          http:
            port: 3000
          rest:
            port: 27124

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: https://obsidian.${SECRET_DOMAIN}/favicon.ico
          gethomepage.dev/title: Obsidian
          gethomepage.dev/description: "Obsidian Vault UI"
          gethomepage.dev/group: "Automation"
        hostnames:
          - obsidian.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3000

      rest:
        hostnames:
          - obsidian-api.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 27124

      mcp:
        hostnames:
          - obsidian-mcp.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 27124

    persistence:
      config:
        existingClaim: obsidian-config
        globalMounts:
          - path: /config

      vault:
        existingClaim: obsidian-vault-app
        globalMounts:
          - path: /vault

      tmp:
        type: emptyDir

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
