---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openreel
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          build-openreel:
            image:
              repository: docker.io/library/node
              tag: 24.16.0-alpine
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eux
                apk add --no-cache git
                git clone --depth=1 --branch v0.4.0 https://github.com/Augani/openreel-video.git /src
                cd /src
                npm install -g pnpm@9.0.0
                pnpm install --frozen-lockfile=false
                pnpm build
                cp -a apps/web/dist/. /webroot/
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
        containers:
          app:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: 1.31.2-alpine
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
                  initialDelaySeconds: 20
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: *port

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: https://openreel.video/favicon.ico
          gethomepage.dev/title: OpenReel
          gethomepage.dev/description: "Browser-based video editor"
          gethomepage.dev/group: "Media"
        hostnames:
          - &host openreel.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port

    persistence:
      webroot:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /usr/share/nginx/html
            build-openreel:
              - path: /webroot
