---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-sync
  labels:
    app.kubernetes.io/name: obsidian-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-sync
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: docker.io/node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if ! command -v ob >/dev/null 2>&1; then
                npm install -g obsidian-headless@latest
              fi

              mkdir -p "${VAULT_PATH}" "${OBSIDIAN_CONFIG_DIR}"

              echo "Obsidian sync worker started (mode=${OBSIDIAN_SYNC_MODE}, interval=${SYNC_INTERVAL_SECONDS}s)."
              while true; do
                if ob sync --path "${VAULT_PATH}"; then
                  date -u +%FT%TZ > /tmp/last_sync_success
                else
                  echo "Sync run failed; check auth/setup and retrying next interval."
                fi
                sleep "${SYNC_INTERVAL_SECONDS}"
              done
          envFrom:
            - configMapRef:
                name: obsidian-sync-config
          env:
            - name: TZ
              value: ${TIMEZONE}
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/last_sync_success
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/last_sync_success
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: vault
              mountPath: /config
              subPath: .obsidian-headless
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
