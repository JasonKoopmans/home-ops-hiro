---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-sync
  labels:
    app.kubernetes.io/name: obsidian-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-sync
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: docker.io/node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if ! command -v ob >/dev/null 2>&1; then
                npm install -g obsidian-headless@latest
              fi

              mkdir -p "${VAULT_PATH}" "${OBSIDIAN_CONFIG_DIR}"
              export HOME="${OBSIDIAN_CONFIG_DIR}"

              # Bootstrap login + sync setup once when the local vault is not configured yet.
              if ! ob sync-status --path "${VAULT_PATH}" >/dev/null 2>&1; then
                if [ -z "${OBSIDIAN_ACCOUNT_EMAIL:-}" ] || [ -z "${OBSIDIAN_ACCOUNT_PASSWORD:-}" ] || [ -z "${OBSIDIAN_SYNC_VAULT:-}" ]; then
                  echo "Missing bootstrap credentials. Set OBSIDIAN_ACCOUNT_EMAIL, OBSIDIAN_ACCOUNT_PASSWORD, and OBSIDIAN_SYNC_VAULT in obsidian-sync-secret."
                  exit 1
                fi

                if [ -n "${OBSIDIAN_ACCOUNT_MFA:-}" ]; then
                  ob login --email "${OBSIDIAN_ACCOUNT_EMAIL}" --password "${OBSIDIAN_ACCOUNT_PASSWORD}" --mfa "${OBSIDIAN_ACCOUNT_MFA}"
                else
                  ob login --email "${OBSIDIAN_ACCOUNT_EMAIL}" --password "${OBSIDIAN_ACCOUNT_PASSWORD}"
                fi

                if [ -n "${OBSIDIAN_SYNC_DEVICE_NAME:-}" ] && [ -n "${OBSIDIAN_SYNC_PASSWORD:-}" ]; then
                  ob sync-setup --vault "${OBSIDIAN_SYNC_VAULT}" --path "${VAULT_PATH}" --device-name "${OBSIDIAN_SYNC_DEVICE_NAME}" --password "${OBSIDIAN_SYNC_PASSWORD}"
                elif [ -n "${OBSIDIAN_SYNC_DEVICE_NAME:-}" ]; then
                  ob sync-setup --vault "${OBSIDIAN_SYNC_VAULT}" --path "${VAULT_PATH}" --device-name "${OBSIDIAN_SYNC_DEVICE_NAME}"
                elif [ -n "${OBSIDIAN_SYNC_PASSWORD:-}" ]; then
                  ob sync-setup --vault "${OBSIDIAN_SYNC_VAULT}" --path "${VAULT_PATH}" --password "${OBSIDIAN_SYNC_PASSWORD}"
                else
                  ob sync-setup --vault "${OBSIDIAN_SYNC_VAULT}" --path "${VAULT_PATH}"
                fi

                ob sync-config --path "${VAULT_PATH}" --mode "${OBSIDIAN_SYNC_MODE}"
              fi

              echo "Obsidian sync worker started (mode=${OBSIDIAN_SYNC_MODE}, interval=${SYNC_INTERVAL_SECONDS}s)."
              while true; do
                if ob sync --path "${VAULT_PATH}"; then
                  date -u +%FT%TZ > /tmp/last_sync_success
                else
                  echo "Sync run failed; check auth/setup and retrying next interval."
                fi
                sleep "${SYNC_INTERVAL_SECONDS}"
              done
          envFrom:
            - configMapRef:
                name: obsidian-sync-config
            - secretRef:
                name: obsidian-sync-secret
                optional: true
          env:
            - name: TZ
              value: ${TIMEZONE}
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/last_sync_success
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/last_sync_success
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: vault
              mountPath: /config
              subPath: .obsidian-headless
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
