---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app obsidian-sync
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/node
              tag: 22-alpine
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu

                export NPM_CONFIG_PREFIX="$(printenv OBSIDIAN_CONFIG_DIR)/.npm-global"
                export PATH="$(printenv OBSIDIAN_CONFIG_DIR)/.npm-global/bin:$(printenv PATH)"
                export HOME="$(printenv OBSIDIAN_CONFIG_DIR)"

                if ! command -v ob >/dev/null 2>&1; then
                  npm install -g obsidian-headless@latest
                fi

                mkdir -p "$(printenv VAULT_PATH)" "$(printenv OBSIDIAN_CONFIG_DIR)"
                echo "Obsidian sync worker started (mode=$(printenv OBSIDIAN_SYNC_MODE), interval=$(printenv SYNC_INTERVAL_SECONDS)s)."
                while true; do
                  # Retry bootstrap on every interval instead of exiting on transient auth/challenge issues.
                  if ! ob sync-status --path "$(printenv VAULT_PATH)" >/dev/null 2>&1; then
                    if [ -z "$(printenv OBSIDIAN_ACCOUNT_EMAIL 2>/dev/null || true)" ] || [ -z "$(printenv OBSIDIAN_ACCOUNT_PASSWORD 2>/dev/null || true)" ] || [ -z "$(printenv OBSIDIAN_SYNC_VAULT 2>/dev/null || true)" ]; then
                      echo "Bootstrap pending: missing required credentials in obsidian-sync-secret."
                      sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                      continue
                    fi

                    echo "Sync not configured locally; attempting bootstrap login/setup."
                    if [ -n "$(printenv OBSIDIAN_ACCOUNT_MFA 2>/dev/null || true)" ]; then
                      if ! ob login --email "$(printenv OBSIDIAN_ACCOUNT_EMAIL)" --password "$(printenv OBSIDIAN_ACCOUNT_PASSWORD)" --mfa "$(printenv OBSIDIAN_ACCOUNT_MFA)"; then
                        echo "Bootstrap login failed (MFA flow). Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    else
                      if ! ob login --email "$(printenv OBSIDIAN_ACCOUNT_EMAIL)" --password "$(printenv OBSIDIAN_ACCOUNT_PASSWORD)"; then
                        echo "Bootstrap login failed (non-MFA flow). Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    fi

                    if [ -n "$(printenv OBSIDIAN_SYNC_DEVICE_NAME 2>/dev/null || true)" ] && [ -n "$(printenv OBSIDIAN_SYNC_PASSWORD 2>/dev/null || true)" ]; then
                      if ! ob sync-setup --vault "$(printenv OBSIDIAN_SYNC_VAULT)" --path "$(printenv VAULT_PATH)" --device-name "$(printenv OBSIDIAN_SYNC_DEVICE_NAME)" --password "$(printenv OBSIDIAN_SYNC_PASSWORD)"; then
                        echo "Bootstrap sync-setup failed (device+password). Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    elif [ -n "$(printenv OBSIDIAN_SYNC_DEVICE_NAME 2>/dev/null || true)" ]; then
                      if ! ob sync-setup --vault "$(printenv OBSIDIAN_SYNC_VAULT)" --path "$(printenv VAULT_PATH)" --device-name "$(printenv OBSIDIAN_SYNC_DEVICE_NAME)"; then
                        echo "Bootstrap sync-setup failed (device only). Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    elif [ -n "$(printenv OBSIDIAN_SYNC_PASSWORD 2>/dev/null || true)" ]; then
                      if ! ob sync-setup --vault "$(printenv OBSIDIAN_SYNC_VAULT)" --path "$(printenv VAULT_PATH)" --password "$(printenv OBSIDIAN_SYNC_PASSWORD)"; then
                        echo "Bootstrap sync-setup failed (password only). Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    else
                      if ! ob sync-setup --vault "$(printenv OBSIDIAN_SYNC_VAULT)" --path "$(printenv VAULT_PATH)"; then
                        echo "Bootstrap sync-setup failed. Will retry next interval."
                        sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                        continue
                      fi
                    fi

                    if ! ob sync-config --path "$(printenv VAULT_PATH)" --mode "$(printenv OBSIDIAN_SYNC_MODE)"; then
                      echo "Bootstrap sync-config failed. Will retry next interval."
                      sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                      continue
                    fi

                    echo "Bootstrap completed successfully."
                  fi

                  if ob sync --path "$(printenv VAULT_PATH)"; then
                    date -u +%FT%TZ > /tmp/last_sync_success
                  else
                    echo "Sync run failed; check auth/setup and retrying next interval."
                  fi
                  sleep "$(printenv SYNC_INTERVAL_SECONDS)"
                done
            envFrom:
              - configMapRef:
                  name: obsidian-sync-config
              - secretRef:
                  name: obsidian-sync-secret
                  optional: true
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness: &syncProbe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - test -f /tmp/last_sync_success
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 5
              readiness: *syncProbe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      vault:
        existingClaim: obsidian-vault
        advancedMounts:
          main:
            app:
              - path: /vault
              - path: /config
                subPath: .obsidian-headless
