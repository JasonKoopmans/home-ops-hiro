---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: kube-prometheus-stack-crds
      namespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "84.3.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  install:
    # CRDs are managed by the kube-prometheus-stack-crds HelmRelease
    crds: Skip
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    # CRDs are managed by the kube-prometheus-stack-crds HelmRelease
    crds: Skip
    remediation:
      retries: 3
  values:
    # Talos Linux: disable kube-proxy monitoring (Cilium handles kube-proxy functionality)
    kubeProxy:
      enabled: false

    alertmanager:
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 14d
        enableRemoteWriteReceiver: true
        # Discover all ServiceMonitors and PodMonitors in the cluster
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-2-no-backup
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 45Gi
        additionalScrapeConfigs:
          - job_name: "opnsense-telegraf"
            scrape_interval: 30s
            metrics_path: /metrics
            static_configs:
              - targets:
                  - "192.168.1.1:9273" # replace with OPNsense IP:port
                labels:
                  site: "home"
                  device: "opnsense"

    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 1Gi
      # Disable built-in ingress; HTTPRoute is used instead
      ingress:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false

    prometheus-node-exporter:
      enabled: true
      extraArgs:
        - --no-collector.kernel_hung
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi

    kube-state-metrics:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi
