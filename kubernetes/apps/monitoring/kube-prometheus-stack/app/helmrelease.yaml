---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: kube-prometheus-stack-crds
      namespace: monitoring
  chart:
    spec:
      # renovate: registryUrl=https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      version: "87.17.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  install:
    # CRDs are managed by the kube-prometheus-stack-crds HelmRelease
    crds: Skip
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    # CRDs are managed by the kube-prometheus-stack-crds HelmRelease
    crds: Skip
    remediation:
      retries: 3
  values:
    # Talos Linux: disable kube-proxy monitoring (Cilium handles kube-proxy functionality)
    kubeProxy:
      enabled: false

    kubeEtcd:
      serviceMonitor:
        metricRelabelings:
          # etcd request histograms are extremely high-cardinality for a homelab.
          # The _count and _sum variants are retained for rate/avg queries.
          #
          # NOTE: this rule only covers etcd's own scrape job, which currently has
          # no targets — the chart's kube-etcd Service has zero endpoints on Talos,
          # so nothing matches this today. It is kept so the rule is already correct
          # if etcd scraping is ever wired up. The series that actually exist come
          # from the apiserver's etcd *client* instrumentation — see kubeApiServer
          # below. Do not assume this rule is what bounds etcd histogram cardinality.
          - action: drop
            sourceLabels: [__name__]
            regex: etcd_request_duration_seconds_bucket

    kubeApiServer:
      serviceMonitor:
        # Scrape the apiserver at 60s instead of the 30s global default. The
        # apiserver is ~43% of total sample ingestion (its large histograms),
        # so halving its scrape rate is the single biggest reduction in TSDB
        # write I/O — which was saturating the (2-CPU) node running Prometheus.
        # All apiserver-derived rules use [5m]+ windows and are unaffected; the
        # one exception is the stock KubeAggregatedAPIErrors alert (a [1m]
        # window), which is disabled by this change — an accepted trade for a
        # homelab. Everything else stays at the 30s global interval.
        interval: 60s
        metricRelabelings:
          # Drop high-cardinality apiserver histograms not needed for basic homelab dashboards.
          #
          # apiserver_request_duration_seconds_bucket (~42.4k series, ~14% of the
          # TSDB) is dropped: its only consumer was the API Server Watch Cache
          # tuning dashboard, retired in this commit once that exercise concluded
          # (see talos/patches/controller/cluster.yaml default-watch-cache-size).
          # No PrometheusRule reads it, and the chart's own API Server dashboard
          # does not either — it reads recording rules derived from the _sli_
          # variant below, not this metric.
          #
          # apiserver_request_sli_duration_seconds_bucket is deliberately KEPT: it
          # is load-bearing for kube-apiserver-{burnrate,availability,histogram}.rules,
          # which produce the recording rules (apiserver_request:availability30d,
          # cluster_quantile:apiserver_request_sli_duration_seconds:histogram_quantile)
          # that the chart's API Server dashboard and the SLO alerts read. Dropping
          # it would silently empty those rules — a recording rule cannot be computed
          # from a series that was dropped at scrape time.
          - action: drop
            sourceLabels: [__name__]
            regex: apiserver_request_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket
          # The kube-apiserver exports its own etcd client histogram under
          # job="apiserver" — distinct from etcd's server-side metrics above. It
          # carries `group` and `resource` labels, so its cardinality scales with
          # every installed CRD: 24 le x 6 operation x 4 apiservers x ~65
          # group/resource pairs = ~37.7k series, ~12.7% of the whole TSDB.
          #
          # Nothing reads it: no PrometheusRule references it, and no dashboard
          # queries it under job="apiserver". _count/_sum are retained, so
          # rate/avg queries still work.
          - action: drop
            sourceLabels: [__name__]
            regex: etcd_request_duration_seconds_bucket

    alertmanager:
      alertmanagerSpec:
        replicas: 1
        # Disable the chart's own podAntiAffinity convenience default (it
        # defaults to "soft" and renders its own podAntiAffinity block under
        # the same affinity key as our custom one below, which is a duplicate
        # YAML mapping key and fails post-render).
        podAntiAffinity: ""
        # Soft anti-affinity: keep Alertmanager off whichever node is running
        # Prometheus, so the two don't compete for CPU on the same (often
        # control-plane-sized) node.
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: ["prometheus"]
                  topologyKey: kubernetes.io/hostname
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    prometheus:
      prometheusSpec:
        replicas: 1
        # Disable the chart's own podAntiAffinity convenience default (it
        # defaults to "soft" and renders its own podAntiAffinity block under
        # the same affinity key as our custom one below, which is a duplicate
        # YAML mapping key and fails post-render).
        podAntiAffinity: ""
        # Soft anti-affinity: keep Prometheus off whichever node is running
        # Alertmanager or the Thanos storegateway, to avoid CPU contention
        # (see monitoring/thanos helmrelease.yaml for the matching rule).
        affinity:
          # Soft preference for the 3-CPU nodes (cmp-01/cmp-02). Prometheus is
          # the heaviest stateful I/O workload here; keeping it off the 2-CPU
          # nodes (cmp-03/cmp-04) avoids saturating them. Preference, not a
          # hard requirement — it still schedules elsewhere if these are full.
          # Matched by hostname since the nodes carry no CPU-tier label.
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values: ["hiro-cmp-01", "hiro-cmp-02"]
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: ["alertmanager"]
                  topologyKey: kubernetes.io/hostname
              - weight: 50
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: ["thanos"]
                      - key: app.kubernetes.io/controller
                        operator: In
                        values: ["storegateway"]
                  topologyKey: kubernetes.io/hostname
        # Reduced from 14d/38GB now that the Thanos sidecar (Phase 3) and Query/Store
        # Gateway/Compactor (Phase 2, confirmed healthy in Phase 4) provide validated
        # long-term durability in Minio. Local Prometheus now only needs to cover:
        #   - fast local queries for recording/alerting rules
        #   - a buffer window in case block uploads to Minio lag or fail transiently
        # 3d/10GB is a conservative buffer (~3x the ~2.7GB/day observed at the prior
        # 14d/38GB ratio) — well short of the Thanos Compactor's own 30d raw retention,
        # so, assuming timely sidecar uploads, there's no intended gap between "local" and "long-term" coverage.
        retention: 3d
        retentionSize: 10GB
        enableRemoteWriteReceiver: true
        # Discover all ServiceMonitors, PodMonitors, and Probes in the cluster
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        # Without this, Probe discovery falls back to the chart's default
        # `release: kube-prometheus-stack` label selector, which the Minio
        # chart's own Probe resource (release: minio) doesn't carry — it would
        # be created but silently never scraped.
        probeSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              # longhorn-tsdb, not longhorn-2-no-backup. Both are 2-replica/no-backup,
              # but the "-no-backup" classes currently set recurringJobSelector: "[]"
              # (intended to opt volumes out of recurring jobs; see storageclasses.yaml).
              # In practice these volumes have still ended up with the `default` group's 6h
              # snapshot (retain 3) and daily backup jobs, so the snapshot chain can grow
              # without bound (coalescing blocks into the root snapshot rather than freeing).
              # without bound: this volume reached 30.15Gi actualSize against 6.92Gi of
              # live TSDB (4.4x), and its engine controller became the top CPU consumer
              # on its node — which in turn timed out the kube-apiserver-burnrate rule
              # evaluations. longhorn-tsdb selects the `tsdb` recurring-job group
              # (daily snapshot, retain 2), which is what this class exists for.
              # See docs/runbook-longhorn-volume-trim.md.
              storageClassName: longhorn-tsdb
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  # Allocates ~16GB (15Gi), i.e. ~1.6x the retentionSize (10GB) — enough for blocks
                  # plus WAL/head, with headroom for compaction.
                  #
                  # NOTE: a StatefulSet's volumeClaimTemplates are immutable, so editing
                  # this value alone never resizes an existing PVC. #265 reduced this
                  # 45Gi -> 15Gi, but the live PVC stayed at 45Gi and was simply adopted
                  # by the rebuilt StatefulSet. That oversizing is not harmless: at 45Gi
                  # the second replica could not be scheduled on any node (100%
                  # over-provisioning; no node had 45Gi free), leaving the volume
                  # permanently `degraded` on a single replica. Changing size or class
                  # here requires deleting the PVC so the StatefulSet reprovisions it.
                  storage: 15Gi
        # Thanos sidecar: uploads TSDB blocks to Minio (observability-thanos bucket) for
        # long-term storage.
        thanos:
          image: quay.io/thanos/thanos:v0.42.2
          objectStorageConfig:
            existingSecret:
              name: thanos-objstore-config
              key: objstore.yml
        additionalScrapeConfigs:
          - job_name: "opnsense-telegraf"
            scrape_interval: 30s
            metrics_path: /metrics
            static_configs:
              - targets:
                  - "192.168.1.1:9273" # replace with OPNsense IP:port
                labels:
                  site: "home"
                  device: "opnsense"

    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate
      # Keep Grafana's persisted datasource rows aligned with the provisioned
      # file once the one-time stale sqlite rows from the pre-uid setup are
      # removed.
      prune: true
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      envValueFrom:
        GF_TELEGRAM_BOT_TOKEN:
          secretKeyRef:
            name: alertmanager-telegram-secret
            key: bot-token
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 1Gi
      # Disable built-in ingress; HTTPRoute is used instead
      ingress:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      # Rename the chart's auto-provisioned Prometheus datasource and demote it from
      # default now that Thanos Query (below) provides the unified short+long-term view.
      # Kept as a secondary datasource for debugging sidecar/upload issues directly
      # against local Prometheus, bypassing Thanos Query's fan-out.
      sidecar:
        datasources:
          name: "Prometheus Local"
          isDefaultDatasource: false
      additionalDataSources:
        - name: Thanos
          type: prometheus
          # Every managed datasource needs an explicit uid. The original
          # uid-less Thanos/Loki pair allowed stale sqlite rows to collide
          # unpredictably during reprovisioning after upgrades or reloads.
          uid: thanos
          url: http://thanos-query.monitoring.svc.cluster.local:10902
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
      alerting:
        contactpoints.yaml:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: Telegram
              receivers:
                - uid: telegram
                  type: telegram
                  disableResolveMessage: false
                  settings:
                    bottoken: $$GF_TELEGRAM_BOT_TOKEN
                    chatid: "8854064758"

    prometheus-node-exporter:
      enabled: true
      extraArgs:
        - --no-collector.kernel_hung
        # Exclude highly dynamic pod volume mounts that can emit duplicate filesystem series.
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/kubelet/pods/.+/volumes/.+|var/lib/kubelet/pods/.+/volume-subpaths/.+)($|/)
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi

    kube-state-metrics:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi
