---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-minio
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  minio-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Thanos Bucket Quota Used",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "minio_bucket_usage_total_bytes{bucket=\"observability-thanos\"} / minio_bucket_quota_total_bytes{bucket=\"observability-thanos\"}",
              "legendFormat": "used"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.70},
                  {"color": "red", "value": 0.90}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Loki Bucket Quota Used",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "minio_bucket_usage_total_bytes{bucket=\"observability-loki\"} / minio_bucket_quota_total_bytes{bucket=\"observability-loki\"}",
              "legendFormat": "used"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.70},
                  {"color": "red", "value": 0.90}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Cluster Capacity Used",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "1 - (minio_cluster_capacity_usable_free_bytes / minio_cluster_capacity_usable_total_bytes)",
              "legendFormat": "used"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.70},
                  {"color": "red", "value": 0.85}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Drives Offline",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {"expr": "minio_cluster_drive_offline_total", "legendFormat": "offline"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Bucket Usage vs Quota",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "targets": [
            {"expr": "minio_bucket_usage_total_bytes{bucket=\"observability-thanos\"}", "legendFormat": "thanos used"},
            {"expr": "minio_bucket_quota_total_bytes{bucket=\"observability-thanos\"}", "legendFormat": "thanos quota"},
            {"expr": "minio_bucket_usage_total_bytes{bucket=\"observability-loki\"}", "legendFormat": "loki used"},
            {"expr": "minio_bucket_quota_total_bytes{bucket=\"observability-loki\"}", "legendFormat": "loki quota"}
          ],
          "fieldConfig": {
            "defaults": {"min": 0, "unit": "bytes", "custom": {"lineWidth": 2, "fillOpacity": 10}},
            "overrides": [
              {
                "matcher": {"id": "byRegexp", "options": "/quota/"},
                "properties": [{"id": "custom.lineStyle", "value": {"dash": [10, 10]}}]
              }
            ]
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "S3 Request Rate",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 12},
          "targets": [
            {"expr": "sum(rate(minio_s3_requests_total[5m]))", "legendFormat": "requests/s"}
          ],
          "fieldConfig": {
            "defaults": {"min": 0, "unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 10}},
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "S3 Request Latency (p99 TTFB)",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 12},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le) (minio_s3_requests_ttfb_seconds_distribution))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {"min": 0, "unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 10}},
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "S3 Traffic",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 12},
          "targets": [
            {"expr": "rate(minio_s3_traffic_received_bytes[5m])", "legendFormat": "received"},
            {"expr": "rate(minio_s3_traffic_sent_bytes[5m])", "legendFormat": "sent"}
          ],
          "fieldConfig": {
            "defaults": {"min": 0, "unit": "Bps", "custom": {"lineWidth": 2, "fillOpacity": 10}},
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "S3 Errors by Type",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 20},
          "targets": [
            {"expr": "sum(rate(minio_s3_requests_4xx_errors_total[5m]))", "legendFormat": "4xx"},
            {"expr": "sum(rate(minio_s3_requests_5xx_errors_total[5m]))", "legendFormat": "5xx"}
          ],
          "fieldConfig": {
            "defaults": {"min": 0, "unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 10}},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "5xx"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]
              }
            ]
          }
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["minio", "storage", "thanos", "loki"],
      "templating": {"list": []},
      "time": {"from": "now-30d", "to": "now"},
      "title": "Minio Overview",
      "version": 1
    }
