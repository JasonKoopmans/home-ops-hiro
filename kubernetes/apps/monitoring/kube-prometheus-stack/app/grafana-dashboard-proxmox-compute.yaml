---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-proxmox-compute
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  proxmox-compute.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Node Exporter Targets Up (Selected Hosts)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(up{job=\"node-exporter\", instance=~\"$host\"})",
              "legendFormat": "up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "CPU Busy %",
          "gridPos": {"h": 8, "w": 9, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job=\"node-exporter\", mode=\"idle\", instance=~\"$host\"}[5m])))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 85},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Memory Used %",
          "gridPos": {"h": 8, "w": 9, "x": 15, "y": 0},
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes{job=\"node-exporter\", instance=~\"$host\"} / node_memory_MemTotal_bytes{job=\"node-exporter\", instance=~\"$host\"}))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 75},
                  {"color": "orange", "value": 85},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Root FS Used %",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "100 * (1 - (node_filesystem_avail_bytes{job=\"node-exporter\", mountpoint=\"/\", fstype!~\"tmpfs|overlay|squashfs\", instance=~\"$host\"} / node_filesystem_size_bytes{job=\"node-exporter\", mountpoint=\"/\", fstype!~\"tmpfs|overlay|squashfs\", instance=~\"$host\"}))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 85},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Inode Used %",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8},
          "targets": [
            {
              "expr": "100 * (1 - (node_filesystem_files_free{job=\"node-exporter\", mountpoint=\"/\", fstype!~\"tmpfs|overlay|squashfs\", instance=~\"$host\"} / node_filesystem_files{job=\"node-exporter\", mountpoint=\"/\", fstype!~\"tmpfs|overlay|squashfs\", instance=~\"$host\"}))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 85},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Readonly Filesystems",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
          "targets": [
            {
              "expr": "sum(node_filesystem_readonly{job=\"node-exporter\", mountpoint=\"/\", fstype!~\"tmpfs|overlay|squashfs\", instance=~\"$host\"})",
              "legendFormat": "readonly"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Disk Throughput (Read/Write bytes/s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_disk_read_bytes_total{job=\"node-exporter\", instance=~\"$host\", device=~\"sd[a-z]+|vd[a-z]+|nvme[0-9]+n[0-9]+|zd[0-9]+\"}[5m]))",
              "legendFormat": "{{instance}} read"
            },
            {
              "expr": "sum by (instance) (rate(node_disk_written_bytes_total{job=\"node-exporter\", instance=~\"$host\", device=~\"sd[a-z]+|vd[a-z]+|nvme[0-9]+n[0-9]+|zd[0-9]+\"}[5m]))",
              "legendFormat": "{{instance}} write"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "min": 0,
              "custom": {"lineWidth": 1, "fillOpacity": 10}
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Disk Busy % (I/O Saturation)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [
            {
              "expr": "100 * sum by (instance) (rate(node_disk_io_time_seconds_total{job=\"node-exporter\", instance=~\"$host\", device=~\"sd[a-z]+|vd[a-z]+|nvme[0-9]+n[0-9]+|zd[0-9]+\"}[5m]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 60},
                  {"color": "orange", "value": 80},
                  {"color": "red", "value": 95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Network Throughput (bits/s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_receive_bytes_total{job=\"node-exporter\", instance=~\"$host\", device!~\"lo|veth.*|cali.*|flannel.*|cilium.*|docker.*|lxcbr.*|tailscale.*|wg.*|zt.*|tun.*\"}[5m])) * 8",
              "legendFormat": "{{instance}} rx"
            },
            {
              "expr": "sum by (instance) (rate(node_network_transmit_bytes_total{job=\"node-exporter\", instance=~\"$host\", device!~\"lo|veth.*|cali.*|flannel.*|cilium.*|docker.*|lxcbr.*|tailscale.*|wg.*|zt.*|tun.*\"}[5m])) * 8",
              "legendFormat": "{{instance}} tx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "min": 0,
              "custom": {"lineWidth": 1, "fillOpacity": 10}
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Network Packets/s",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_receive_packets_total{job=\"node-exporter\", instance=~\"$host\", device!~\"lo|veth.*|cali.*|flannel.*|cilium.*|docker.*|lxcbr.*|tailscale.*|wg.*|zt.*|tun.*\"}[5m]))",
              "legendFormat": "{{instance}} rx pps"
            },
            {
              "expr": "sum by (instance) (rate(node_network_transmit_packets_total{job=\"node-exporter\", instance=~\"$host\", device!~\"lo|veth.*|cali.*|flannel.*|cilium.*|docker.*|lxcbr.*|tailscale.*|wg.*|zt.*|tun.*\"}[5m]))",
              "legendFormat": "{{instance}} tx pps"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "min": 0,
              "custom": {"lineWidth": 1, "fillOpacity": 10}
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["compute", "proxmox", "homelab", "hosts"],
      "templating": {
        "list": [
          {
            "name": "host",
            "label": "Host",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
            "query": "label_values(up{job=\"node-exporter\"}, instance)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".*"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "title": "Proxmox Compute Health",
      "version": 1
    }
