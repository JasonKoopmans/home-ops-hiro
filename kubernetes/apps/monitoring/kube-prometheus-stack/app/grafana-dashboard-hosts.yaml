---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-host-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  host-health.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Node Exporter Targets Up",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {"expr": "sum(up{job=\"node-exporter\"})", "legendFormat": "up"}
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "CPU Busy %",
          "gridPos": {"h": 8, "w": 18, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job=\"node-exporter\",mode=\"idle\"}[5m])))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "Memory Used %",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes{job=\"node-exporter\"} / node_memory_MemTotal_bytes{job=\"node-exporter\"}))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 75},
                  {"color": "red", "value": 90}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "Root FS Used %",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "100 * (1 - (node_filesystem_avail_bytes{job=\"node-exporter\",mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{job=\"node-exporter\",mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 75},
                  {"color": "red", "value": 90}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "Load 1m",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "node_load1{job=\"node-exporter\"}",
              "legendFormat": "{{instance}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["hosts", "node-exporter"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "Host Health Overview",
      "version": 1
    }