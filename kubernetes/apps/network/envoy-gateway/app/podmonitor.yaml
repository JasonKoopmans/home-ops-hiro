---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy
spec:
  jobLabel: envoy-proxy
  namespaceSelector:
    matchNames:
      - network
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      honorLabels: true
      metricRelabelings:
        # Envoy emits this series twice with different values, which triggers
        # Prometheus duplicate-timestamp sample drops on scrape.
        - action: drop
          sourceLabels:
            - __name__
            - envoy_cluster_name
            - socket_match_name
          regex: envoy_cluster_total_match_count;httproute/default/knative-smoke;default
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/name: envoy
